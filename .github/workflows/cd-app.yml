name: CD - App to AWS k3s

# Real CI->deploy loop: build the app, push to ECR (keyless via OIDC), scan it,
# then tell the k3s node to roll the new image via SSM Run Command.
# CI never holds a kubeconfig and the kube API is never exposed to CI.
#
# No account ID in source: the role ARN comes from the repo variable AWS_ROLE_ARN
# and the ECR registry is derived at runtime after authentication.
on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - "app/**"
      - ".github/workflows/cd-app.yml"

permissions:
  id-token: write # mint the OIDC token to assume the AWS role
  contents: read

env:
  AWS_REGION: ap-southeast-1
  ECR_REPO: central-infra/talent-api

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC, no static keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Derive ECR registry from the authenticated account
        run: echo "ECR_REGISTRY=$(aws sts get-caller-identity --query Account --output text).dkr.ecr.${AWS_REGION}.amazonaws.com" >> "$GITHUB_ENV"

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push image (git-SHA tag)
        uses: docker/build-push-action@v6
        with:
          context: ./app
          push: true
          tags: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ github.sha }}

      # Report-only for the demo; set exit-code "1" to gate on HIGH/CRITICAL CVEs.
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: "0"

      - name: Deploy to k3s via SSM Run Command
        run: |
          set -euo pipefail
          IMAGE="${ECR_REGISTRY}/${ECR_REPO}:${GITHUB_SHA}"

          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=central-infra-k3s" \
                      "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" --output text)
          echo "Target instance: $INSTANCE_ID"

          # Update the on-disk manifest (so restarts don't revert) AND set the
          # image live for an immediate rollout.
          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --comment "Deploy ${GITHUB_SHA}" \
            --parameters commands='[
              "export KUBECONFIG=/etc/rancher/k3s/k3s.yaml",
              "sed -i \"s|image: .*|image: '"$IMAGE"'|\" /var/lib/rancher/k3s/server/manifests/talent-api.yaml",
              "kubectl set image deployment/talent-api talent-api='"$IMAGE"' -n default",
              "kubectl rollout status deployment/talent-api -n default --timeout=120s"
            ]' \
            --query "Command.CommandId" --output text)
          echo "SSM command: $CMD_ID"

          aws ssm wait command-executed --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" || true
          STATUS=$(aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query Status --output text)
          echo "----- deploy output -----"
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query StandardOutputContent --output text
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query StandardErrorContent --output text
          echo "Status: $STATUS"
          [ "$STATUS" = "Success" ]
